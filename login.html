<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>

    <!-- Swiper JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/> 

    <!-- Start Import Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">    
    
    <link rel="stylesheet" href="/assets/css/index.css">
    <!-- End Import Link -->

  </head>
  <body class="bg-white">
    
    <section class="d-flex">
        <div class="d-flex align-items-center px-0 px-md-5" style="background: url('/assets/img/bgAuth.png'); background-position: center; background-size: cover; height: 100vh; max-width: 60%;">
            <div class="text-center">
                <img class="mb-32" src="/assets/icon/logoWhite.svg" alt="logoDark">
                <h1 class="h2 colorWhite">
                    “Discover the beauty of authentic Indonesian culinary delights at Nusantara Cafe, a place where traditional flavors meet a modern atmosphere.”
                </h1>
            </div>
        </div>
        <div class="my-auto mx-auto" style="max-width: 30%; max-height: 100vh;">
            <div class="d-flex flex-column align-items-center px-0 px-md-5">
            <h1 class="h2 mb-20">Welcome back</h1>
            <p class="h4 colorGray text-center mb-20">Nice to see you again! Please log in to your account to enjoy the best experience with us.</p>

            <!-- Email -->
            <div class="inputGroup w-100 mb-20">
              <label for="email">Email</label>
              <div class="inputContainer">
                <input type="email" id="email" placeholder="your@account.com" />
                <img src="/assets/icon/mail.svg" alt="emailIcon">
              </div>
            </div>

            <!-- Password -->
            <div class="inputGroup w-100 mb-20">
              <label for="password">Password</label>
              <div class="inputContainer">
                <input type="password" id="password" placeholder="your password" />
                <img src="/assets/icon/lock.svg" alt="passIcon">
              </div>
            </div> 
            
            <!-- Button -->
            <button class="btnPrimary w-100 mb-20" style="width: 100%;">
                Login
            </button>
            
            <a href="register.html" class="btnPrimaryOutline w-100">
                Create new account
            </a>                

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- Script::End -->

  </body>
</html>
